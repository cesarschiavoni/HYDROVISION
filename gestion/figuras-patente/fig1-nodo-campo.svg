<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 620" width="800" height="620" font-family="Arial, sans-serif">
  <title>Figura 1 — Vista general del nodo de campo HydroVision AG</title>

  <!-- Fondo -->
  <rect width="800" height="620" fill="#fff" stroke="#333" stroke-width="1.5"/>

  <!-- Título -->
  <text x="400" y="28" text-anchor="middle" font-size="13" font-weight="bold" fill="#111">
    FIGURA 1 — Vista general del nodo de campo autónomo
  </text>
  <text x="400" y="44" text-anchor="middle" font-size="10" fill="#555">HydroVision AG — Solicitud de Patente INPI Argentina</text>
  <line x1="20" y1="52" x2="780" y2="52" stroke="#ccc" stroke-width="0.8"/>

  <!-- ═══════════════════════ SUELO ═══════════════════════ -->
  <rect x="100" y="510" width="460" height="18" fill="#c8b89a" rx="2"/>
  <text x="330" y="522" text-anchor="middle" font-size="9" fill="#6b4e2a">SUELO</text>

  <!-- ═══════════════════════ ESTACA ═══════════════════════ -->
  <rect x="275" y="340" width="10" height="172" fill="#888" rx="2"/>
  <polygon points="275,510 285,510 280,528" fill="#666"/>
  <!-- Etiqueta [15] -->
  <line x1="285" y1="480" x2="340" y2="480" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="345" y="484" font-size="9" fill="#333">[15] Estaca acero inox. 316L, 1.5 m</text>

  <!-- ═══════════════════════ CARCASA IP65 ═══════════════════════ -->
  <rect x="210" y="290" width="140" height="120" fill="#e8f0e8" stroke="#2d6a2d" stroke-width="2" rx="8"/>
  <text x="280" y="308" text-anchor="middle" font-size="9" font-weight="bold" fill="#2d6a2d">CARCASA IP65</text>
  <!-- Interior carcasa: MCU + LoRa + Batería -->
  <rect x="218" y="312" width="56" height="28" fill="#d0e8d0" stroke="#2d6a2d" stroke-width="1" rx="3"/>
  <text x="246" y="323" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#1a4a1a">ESP32-S3</text>
  <text x="246" y="333" text-anchor="middle" font-size="7" fill="#1a4a1a">dual-core 240MHz</text>

  <rect x="218" y="346" width="56" height="22" fill="#d0d8f0" stroke="#4a4a8a" stroke-width="1" rx="3"/>
  <text x="246" y="357" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#1a1a5a">LoRa SX1262</text>
  <text x="246" y="366" text-anchor="middle" font-size="7" fill="#1a1a5a">915 MHz</text>

  <rect x="282" y="312" width="56" height="56" fill="#f0e8c0" stroke="#8a6a00" stroke-width="1" rx="3"/>
  <text x="310" y="325" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#5a4a00">LiFePO₄</text>
  <text x="310" y="335" text-anchor="middle" font-size="7" fill="#5a4a00">6 Ah / 22 Wh</text>
  <text x="310" y="345" text-anchor="middle" font-size="7" fill="#5a4a00">Autonomía</text>
  <text x="310" y="355" text-anchor="middle" font-size="7" fill="#5a4a00">120 h sin sol</text>

  <rect x="218" y="374" width="120" height="18" fill="#e0e0e0" stroke="#666" stroke-width="1" rx="2"/>
  <text x="278" y="385" text-anchor="middle" font-size="7.5" fill="#333">PCB 4-layer + controlador solar</text>

  <!-- Etiqueta carcasa -->
  <line x1="210" y1="350" x2="150" y2="350" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="145" y="346" text-anchor="end" font-size="9" fill="#333">[12]</text>
  <text x="145" y="356" text-anchor="end" font-size="9" fill="#333">Carcasa</text>

  <!-- ═══════════════════════ PANEL SOLAR ═══════════════════════ -->
  <rect x="220" y="248" width="120" height="36" fill="#b0c8e8" stroke="#2255aa" stroke-width="2" rx="4"/>
  <!-- Celdas solares -->
  <line x1="248" y1="248" x2="248" y2="284" stroke="#2255aa" stroke-width="0.5"/>
  <line x1="276" y1="248" x2="276" y2="284" stroke="#2255aa" stroke-width="0.5"/>
  <line x1="304" y1="248" x2="304" y2="284" stroke="#2255aa" stroke-width="0.5"/>
  <line x1="220" y1="266" x2="340" y2="266" stroke="#2255aa" stroke-width="0.5"/>
  <text x="280" y="262" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#1a3a7a">Panel Solar 6W / 6V</text>
  <text x="280" y="276" text-anchor="middle" font-size="7.5" fill="#1a3a7a">Policristalino — +30 Wh/día</text>
  <!-- Etiqueta -->
  <line x1="340" y1="266" x2="400" y2="260" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="405" y="258" font-size="9" fill="#333">[11] Panel solar + LiFePO₄</text>

  <!-- ═══════════════════════ GIMBAL + CÁMARA LWIR ═══════════════════════ -->
  <!-- Brazo gimbal -->
  <rect x="272" y="258" width="16" height="32" fill="#aaa" stroke="#666" stroke-width="1" rx="2"/>
  <!-- Base gimbal -->
  <ellipse cx="280" cy="256" rx="18" ry="7" fill="#888" stroke="#555" stroke-width="1.5"/>
  <text x="305" y="254" font-size="8" fill="#555">IMU ICM-42688-P</text>

  <!-- Cámara LWIR -->
  <rect x="258" y="210" width="44" height="42" fill="#2d2d2d" stroke="#111" stroke-width="2" rx="4"/>
  <ellipse cx="280" cy="231" rx="14" ry="14" fill="#1a1a3a" stroke="#4a4a8a" stroke-width="2"/>
  <ellipse cx="280" cy="231" rx="8" ry="8" fill="#0a0a2a" stroke="#6a6aaa" stroke-width="1.5"/>
  <ellipse cx="280" cy="231" rx="3" ry="3" fill="#aaaaff"/>
  <!-- Limpieza piezoeléctrica -->
  <rect x="258" y="210" width="10" height="10" fill="#ff8800" stroke="#cc6600" stroke-width="1" rx="2"/>
  <text x="256" y="208" text-anchor="middle" font-size="7" fill="#cc6600">[7]</text>
  <!-- Servos pan-tilt -->
  <rect x="248" y="220" width="10" height="20" fill="#666" stroke="#444" stroke-width="1" rx="1"/>
  <rect x="302" y="220" width="10" height="20" fill="#666" stroke="#444" stroke-width="1" rx="1"/>
  <text x="238" y="228" text-anchor="end" font-size="7" fill="#555">MG90S</text>
  <text x="312" y="228" font-size="7" fill="#555">MG90S</text>

  <!-- Etiquetas cámara -->
  <line x1="302" y1="231" x2="400" y2="200" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="405" y="196" font-size="9" fill="#333">[1/2] Cámara LWIR MLX90640</text>
  <text x="405" y="207" font-size="9" fill="#555">  32×24 px · FOV 110°×75° · NETD 100mK</text>

  <line x1="258" y1="231" x2="180" y2="215" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="175" y="210" text-anchor="end" font-size="9" fill="#333">[10] Gimbal pan-tilt 2 ejes</text>
  <text x="175" y="221" text-anchor="end" font-size="9" fill="#555">  ±20°H / ±15°V · 5+1 pos.</text>

  <!-- ═══════════════════════ PANELES DRY REF / WET REF ═══════════════════════ -->
  <!-- Dry Ref -->
  <rect x="370" y="330" width="55" height="40" fill="#2d2d2d" stroke="#111" stroke-width="2" rx="3"/>
  <text x="397" y="346" text-anchor="middle" font-size="8" font-weight="bold" fill="#fff">DRY REF</text>
  <text x="397" y="357" text-anchor="middle" font-size="7" fill="#ccc">ε ≈ 0.98</text>
  <text x="397" y="367" text-anchor="middle" font-size="7" fill="#ccc">Al. negro mate</text>
  <line x1="425" y1="350" x2="480" y2="345" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="485" y="349" font-size="9" fill="#333">[13] Panel Dry Ref</text>

  <!-- Wet Ref -->
  <rect x="370" y="380" width="55" height="50" fill="#c0e0ff" stroke="#2255aa" stroke-width="2" rx="3"/>
  <text x="397" y="396" text-anchor="middle" font-size="8" font-weight="bold" fill="#1a3a7a">WET REF</text>
  <text x="397" y="406" text-anchor="middle" font-size="7" fill="#1a3a7a">Fieltro hidrofílico</text>
  <!-- Mini bomba -->
  <rect x="378" y="410" width="38" height="12" fill="#88aacc" stroke="#2255aa" stroke-width="1" rx="2"/>
  <text x="397" y="419" text-anchor="middle" font-size="7" fill="#1a3a7a">Bomba 6V</text>
  <line x1="425" y1="405" x2="480" y2="400" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="485" y="404" font-size="9" fill="#333">[13] Panel Wet Ref</text>
  <text x="485" y="415" font-size="9" fill="#555">  Reservorio 10L · 90–120 días</text>

  <!-- ═══════════════════════ SENSOR METEOROLÓGICO ═══════════════════════ -->
  <!-- SHT31 -->
  <rect x="155" y="310" width="48" height="30" fill="#e8e0f8" stroke="#6644aa" stroke-width="1.5" rx="3"/>
  <text x="179" y="323" text-anchor="middle" font-size="8" font-weight="bold" fill="#442288">SHT31</text>
  <text x="179" y="333" text-anchor="middle" font-size="7" fill="#442288">T/HR ±0.3°C</text>
  <line x1="155" y1="325" x2="110" y2="325" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="105" y="322" text-anchor="end" font-size="9" fill="#333">[7] SHT31 · T/HR</text>

  <!-- Anemómetro -->
  <circle cx="150" cy="240" r="22" fill="#f0f0f0" stroke="#888" stroke-width="1.5"/>
  <line x1="150" y1="218" x2="150" y2="228" stroke="#555" stroke-width="1.5"/>
  <line x1="172" y1="240" x2="162" y2="240" stroke="#555" stroke-width="1.5"/>
  <line x1="128" y1="240" x2="138" y2="240" stroke="#555" stroke-width="1.5"/>
  <circle cx="150" cy="240" r="5" fill="#888"/>
  <!-- Cazoletas -->
  <ellipse cx="150" cy="215" rx="7" ry="5" fill="#aaa" stroke="#666" stroke-width="1"/>
  <ellipse cx="173" cy="240" rx="5" ry="7" fill="#aaa" stroke="#666" stroke-width="1"/>
  <ellipse cx="127" cy="240" rx="5" ry="7" fill="#aaa" stroke="#666" stroke-width="1"/>
  <text x="100" y="270" text-anchor="middle" font-size="8" fill="#555">[5] Anemómetro</text>
  <text x="100" y="280" text-anchor="middle" font-size="7.5" fill="#555">RS485 Modbus</text>

  <!-- Pluviómetro -->
  <rect x="117" y="360" width="36" height="50" fill="#e0f0ff" stroke="#2288cc" stroke-width="1.5" rx="4"/>
  <polygon points="117,360 153,360 135,345" fill="#c0e0ff" stroke="#2288cc" stroke-width="1"/>
  <text x="135" y="380" text-anchor="middle" font-size="7.5" font-weight="bold" fill="#1a5a8a">Pluvió-</text>
  <text x="135" y="390" text-anchor="middle" font-size="7.5" fill="#1a5a8a">metro</text>
  <text x="135" y="400" text-anchor="middle" font-size="7" fill="#1a5a8a">0.2 mm</text>
  <text x="135" y="410" text-anchor="middle" font-size="7" fill="#1a5a8a">GPIO</text>
  <line x1="117" y1="385" x2="80" y2="385" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="75" y="382" text-anchor="end" font-size="9" fill="#333">[6] Pluviómetro</text>

  <!-- GPS -->
  <rect x="155" y="260" width="42" height="30" fill="#e8f8e0" stroke="#44aa22" stroke-width="1.5" rx="3"/>
  <text x="176" y="273" text-anchor="middle" font-size="8" font-weight="bold" fill="#226611">GPS</text>
  <text x="176" y="283" text-anchor="middle" font-size="7" fill="#226611">NEO-6M · UART</text>
  <line x1="155" y1="275" x2="110" y2="275" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="105" y="272" text-anchor="end" font-size="9" fill="#333">[8] GPS NEO-6M</text>

  <!-- ═══════════════════════ EXTENSÓMETRO DE TRONCO ═══════════════════════ -->
  <!-- Planta (tronco) -->
  <rect x="460" y="380" width="30" height="130" fill="#8b5e3c" rx="6"/>
  <ellipse cx="475" cy="375" rx="35" ry="20" fill="#3a7a1a" opacity="0.6"/>
  <ellipse cx="450" cy="360" rx="25" ry="15" fill="#3a7a1a" opacity="0.5"/>
  <ellipse cx="500" cy="365" rx="28" ry="16" fill="#3a7a1a" opacity="0.5"/>
  <text x="475" y="555" text-anchor="middle" font-size="9" fill="#5a3a1a">Planta</text>

  <!-- Abrazadera + extensómetro -->
  <rect x="455" y="450" width="40" height="18" fill="#c0c0c0" stroke="#888" stroke-width="1.5" rx="2"/>
  <rect x="495" y="452" width="30" height="14" fill="#e0d0a0" stroke="#aa8800" stroke-width="1.5" rx="2"/>
  <!-- Cable extensómetro -->
  <path d="M525,459 Q550,460 555,440 Q558,420 540,415" fill="none" stroke="#aa6600" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="462" y="461" text-anchor="middle" font-size="7" fill="#333">Abrazadera</text>

  <line x1="525" y1="459" x2="600" y2="470" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="605" y="468" font-size="9" fill="#333">[4] Extensómetro tronco</text>
  <text x="605" y="480" font-size="9" fill="#555">  Strain gauge + ADS1231 24-bit</text>
  <text x="605" y="491" font-size="9" fill="#555">  + DS18B20 (correc. térmica)</text>
  <text x="605" y="502" font-size="9" fill="#555">  Resolución: 1 µm · R²=0.80–0.92</text>

  <!-- ═══════════════════════ ANTENA LORA ═══════════════════════ -->
  <line x1="280" y1="290" x2="280" y2="248" stroke="#888" stroke-width="1"/>
  <!-- Antena LoRa en lateral carcasa -->
  <line x1="355" y1="310" x2="385" y2="295" stroke="#444" stroke-width="1.5"/>
  <line x1="385" y1="295" x2="385" y2="265" stroke="#444" stroke-width="2"/>
  <line x1="375" y1="268" x2="395" y2="268" stroke="#444" stroke-width="1.5"/>
  <line x1="378" y1="274" x2="392" y2="274" stroke="#444" stroke-width="1"/>
  <line x1="381" y1="280" x2="389" y2="280" stroke="#444" stroke-width="0.8"/>
  <line x1="385" y1="295" x2="430" y2="290" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="435" y="288" font-size="9" fill="#333">[3] Antena LoRa 915 MHz</text>

  <!-- ═══════════════════════ ACTUADOR RIEGO (Tier 2-3) ═══════════════════════ -->
  <rect x="390" y="455" width="55" height="35" fill="#ffe0e0" stroke="#cc2222" stroke-width="1.5" rx="3"/>
  <text x="417" y="469" text-anchor="middle" font-size="8" font-weight="bold" fill="#aa1111">SSR 24VAC</text>
  <text x="417" y="480" text-anchor="middle" font-size="7" fill="#aa1111">+ Solenoide</text>
  <text x="417" y="490" text-anchor="middle" font-size="7" fill="#aa1111">Rain Bird</text>
  <line x1="445" y1="472" x2="485" y2="472" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="490" y="470" font-size="9" fill="#333">[17] Actuador riego Tier 2-3</text>
  <text x="490" y="481" font-size="9" fill="#555">  GPIO → SSR 24VAC → Solenoide</text>

  <!-- ═══════════════════════ PMS5003 ═══════════════════════ -->
  <rect x="155" y="430" width="48" height="30" fill="#fff0e0" stroke="#cc8800" stroke-width="1.5" rx="3"/>
  <text x="179" y="443" text-anchor="middle" font-size="8" font-weight="bold" fill="#885500">PMS5003</text>
  <text x="179" y="453" text-anchor="middle" font-size="7" fill="#885500">PM2.5/PM10</text>
  <line x1="155" y1="445" x2="110" y2="445" stroke="#333" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="105" y="440" text-anchor="end" font-size="9" fill="#333">[14b] Sensor PM</text>
  <text x="105" y="451" text-anchor="end" font-size="9" fill="#555">Detección fumigación</text>

  <!-- ═══════════════════════ LEYENDA ═══════════════════════ -->
  <rect x="20" y="560" width="760" height="50" fill="#f8f8f8" stroke="#ccc" stroke-width="0.8" rx="3"/>
  <text x="30" y="576" font-size="8.5" font-weight="bold" fill="#333">Referencias:</text>
  <text x="30" y="589" font-size="8" fill="#555">[1] Cámara LWIR MLX90640  [3] LoRa SX1262  [4] Extensómetro tronco  [5] Anemómetro RS485  [6] Pluviómetro  [7] SHT31 T/HR</text>
  <text x="30" y="601" font-size="8" fill="#555">[8] GPS NEO-6M  [10] Gimbal+IMU  [11] Solar+LiFePO₄  [12] Carcasa IP65  [13] Dry Ref / Wet Ref  [14b] PMS5003  [15] Estaca  [17] SSR+Solenoide</text>
</svg>
